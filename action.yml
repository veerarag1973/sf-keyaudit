name: 'sf-keyaudit'
description: 'Scan codebases for exposed AI API keys across all major providers'
author: 'Spanforge'

branding:
  icon: 'shield'
  color: 'red'

inputs:
  path:
    description: 'Directory to scan (defaults to repo root)'
    required: false
    default: '.'
  format:
    description: 'Output format: json, sarif, or text'
    required: false
    default: 'sarif'
  output:
    description: 'Write report to this file path instead of stdout'
    required: false
    default: 'sf-keyaudit-results.sarif'
  since-commit:
    description: 'Scan files changed since this git ref (e.g. origin/main)'
    required: false
  staged:
    description: 'Scan only staged files'
    required: false
    default: 'false'
  baseline:
    description: 'Path to a baseline file — suppress already-known findings'
    required: false
  verify:
    description: 'Run offline heuristic validation on findings'
    required: false
    default: 'false'
  fail-fast:
    description: 'Stop on the first finding'
    required: false
    default: 'false'
  providers:
    description: 'Comma-separated list of providers to scan (default: all)'
    required: false
  args:
    description: 'Additional arguments passed verbatim to sf-keyaudit'
    required: false
    default: ''

outputs:
  findings-count:
    description: 'Number of high-confidence findings detected'

runs:
  using: 'composite'
  steps:
    - name: Ensure Rust toolchain is available
      uses: dtolnay/rust-toolchain@stable

    - name: Install sf-keyaudit
      shell: bash
      run: |
        if ! command -v sf-keyaudit &>/dev/null; then
          cargo install sf-keyaudit --locked
        fi

    - name: Run sf-keyaudit
      id: scan
      shell: bash
      run: |
        ARGS="${{ inputs.path }}"
        ARGS="$ARGS --format ${{ inputs.format }}"
        ARGS="$ARGS --output ${{ inputs.output }}"

        if [ -n "${{ inputs.since-commit }}" ]; then
          ARGS="$ARGS --since-commit ${{ inputs.since-commit }}"
        fi
        if [ "${{ inputs.staged }}" = "true" ]; then
          ARGS="$ARGS --staged"
        fi
        if [ -n "${{ inputs.baseline }}" ]; then
          ARGS="$ARGS --baseline ${{ inputs.baseline }}"
        fi
        if [ "${{ inputs.verify }}" = "true" ]; then
          ARGS="$ARGS --verify"
        fi
        if [ "${{ inputs.fail-fast }}" = "true" ]; then
          ARGS="$ARGS --fail-fast"
        fi
        if [ -n "${{ inputs.providers }}" ]; then
          ARGS="$ARGS --providers ${{ inputs.providers }}"
        fi

        # Append any extra user-supplied arguments.
        ARGS="$ARGS ${{ inputs.args }}"

        # Run the main scan with the user's requested format.
        if sf-keyaudit $ARGS; then
          SCAN_EXIT=0
        else
          SCAN_EXIT=$?
        fi

        # Capture the finding count via a JSON sidecar (file-system page cache
        # makes the second pass significantly faster than the first).
        BASE_ARGS="${{ inputs.path }}"
        if [ -n "${{ inputs.since-commit }}" ]; then
          BASE_ARGS="$BASE_ARGS --since-commit ${{ inputs.since-commit }}"
        fi
        if [ "${{ inputs.staged }}" = "true" ]; then
          BASE_ARGS="$BASE_ARGS --staged"
        fi
        if [ -n "${{ inputs.baseline }}" ]; then
          BASE_ARGS="$BASE_ARGS --baseline ${{ inputs.baseline }}"
        fi
        if [ "${{ inputs.verify }}" = "true" ]; then
          BASE_ARGS="$BASE_ARGS --verify"
        fi
        if [ -n "${{ inputs.providers }}" ]; then
          BASE_ARGS="$BASE_ARGS --providers ${{ inputs.providers }}"
        fi
        BASE_ARGS="$BASE_ARGS ${{ inputs.args }}"
        sf-keyaudit $BASE_ARGS --format json --output /tmp/_sf_keyaudit_count.json --quiet 2>/dev/null || true
        COUNT=$(python3 - <<'EOF'
import json, sys
try:
    d = json.load(open('/tmp/_sf_keyaudit_count.json'))
    print(d.get('summary', {}).get('total_findings', 0))
except Exception:
    print(0)
EOF
        )
        echo "findings-count=${COUNT:-0}" >> "$GITHUB_OUTPUT"
        exit $SCAN_EXIT

    - name: Upload SARIF to GitHub Code Scanning
      if: inputs.format == 'sarif' && always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.output }}
        category: sf-keyaudit
