name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write      # required for SLSA provenance attestation
  attestations: write  # required for actions/attest-build-provenance

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: sf-keyaudit-linux-x86_64
            binary_name: sf-keyaudit
            archive: sf-keyaudit-linux-x86_64.tar.gz
          - os: windows-latest
            artifact_name: sf-keyaudit-windows-x86_64
            binary_name: sf-keyaudit.exe
            archive: sf-keyaudit-windows-x86_64.zip
          - os: macos-14
            artifact_name: sf-keyaudit-macos-arm64
            binary_name: sf-keyaudit
            archive: sf-keyaudit-macos-arm64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}
          tar -C dist -czf ${{ matrix.archive }} ${{ matrix.binary_name }}

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}
          Compress-Archive -Path dist/${{ matrix.binary_name }} -DestinationPath ${{ matrix.archive }} -Force

      # ── SHA-256 checksums ─────────────────────────────────────────────────

      - name: Compute SHA-256 checksum (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          sha256sum ${{ matrix.archive }} > ${{ matrix.archive }}.sha256
          echo "=== checksum ==="
          cat ${{ matrix.archive }}.sha256

      - name: Compute SHA-256 checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "${{ matrix.archive }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.archive }}" | Out-File -Encoding ascii "${{ matrix.archive }}.sha256"
          Write-Host "=== checksum ==="
          Get-Content "${{ matrix.archive }}.sha256"

      # ── SLSA provenance attestation ───────────────────────────────────────
      # Attestations are only created for tagged releases, not workflow_dispatch.

      - name: Attest build provenance (Unix)
        if: startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ matrix.archive }}

      - name: Attest build provenance (Windows)
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ matrix.archive }}

      # ── Upload artifacts for the aggregation jobs ─────────────────────────

      - name: Upload workflow artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

      - name: Upload workflow artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

      # ── Publish to GitHub Release ─────────────────────────────────────────

      - name: Publish GitHub release assets (Unix)
        if: startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

      - name: Publish GitHub release assets (Windows)
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  # ── Aggregate all checksums into a single checksums.txt ──────────────────

  checksums:
    name: Aggregate checksums
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build combined checksums.txt
        run: |
          find artifacts -name '*.sha256' -exec cat {} \; | sort > checksums.txt
          echo "=== checksums.txt ==="
          cat checksums.txt

      - name: Publish checksums.txt to release
        uses: softprops/action-gh-release@v2
        with:
          files: checksums.txt

  # ── Generate CycloneDX + SPDX SBOMs ──────────────────────────────────────

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate CycloneDX SBOM (JSON)
        run: |
          cargo cyclonedx --format json --spec-version 1.5
          # cargo-cyclonedx writes <crate_name>.cdx.json
          mv sf-keyaudit.cdx.json sf-keyaudit-${{ github.ref_name }}-sbom.cdx.json

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sf-keyaudit-${{ github.ref_name }}-sbom.spdx.json
          artifact-name: sf-keyaudit-${{ github.ref_name }}-sbom.spdx.json

      - name: Publish SBOMs to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sf-keyaudit-${{ github.ref_name }}-sbom.cdx.json
            sf-keyaudit-${{ github.ref_name }}-sbom.spdx.json